# Aucune section [build] : le déploiement par glisser-déposer ne lance pas de build.
# Les fonctions n'ont AUCUNE dépendance npm, donc rien à installer.

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Veille automatique, app fermée, Mac éteint. Lundi 8h UTC.
# Quotidien : "0 8 * * *"   |   Lundi et jeudi : "0 8 * * 1,4"
[functions."veille-auto"]
  schedule = "0 8 * * 1"
