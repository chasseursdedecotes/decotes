<html lang="fr">
<head>

<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Décotes</title>
<style>

    --line:rgba(0,0,0,.09); --line2:rgba(0,0,0,.05);
    --accent:#0066cc; --accent-soft:#eff6ff;
    --up:#1a7f37; --up-soft:#e9f6ed; --down:#c9372c; --down-soft:#fdeceb;
    --warn:#9a6700; --warn-soft:#fff8e6;
    --r:14px; --shadow:0 1px 2px rgba(0,0,0,.04),0 10px 30px rgba(0,0,0,.07);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Inter","Helvetica Neue",sans-serif;

  #app{max-width:1120px;margin:0 auto;padding:0 24px 100px}
  button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,textarea{font:inherit;color:inherit}
  a{color:var(--accent);text-decoration:none}
  ::selection{background:var(--accent);color:#fff}

  .top{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.84);

  .brand{font-size:17px;font-weight:600;letter-spacing:-.02em}
  .tabs{display:flex;gap:2px}
  .tab{padding:6px 12px;border-radius:999px;font-size:13px;color:var(--ink2)}

  .tab.on{background:var(--ink);color:#fff}
  .cta{background:var(--accent);color:#fff;padding:7px 15px;border-radius:999px;font-size:13px;font-weight:500}
  .cta:hover{opacity:.88}

  .cta.ghost{background:var(--surface);color:var(--ink)}
  .lnk{font-size:12.5px;color:var(--accent);white-space:nowrap}

  .hero{padding:46px 0 32px;border-bottom:1px solid var(--line2)}
  .hero h1{font-size:34px;font-weight:600;letter-spacing:-.03em;line-height:1.14}
  .hero p{color:var(--ink2);margin-top:7px}
  .attest{display:inline-flex;align-items:center;gap:7px;margin-top:18px;background:var(--surface);

  .dot{width:6px;height:6px;border-radius:50%;background:var(--up);flex-shrink:0}

    transition:box-shadow .18s,transform .18s}

    transform:translateY(-2px);border-color:rgba(0,0,0,.14)}
  .card.armed{border-color:var(--warn);background:var(--warn-soft)}
  .card.stale{border-color:var(--accent)}
  .chead{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
  .cname{font-size:15px;font-weight:590;letter-spacing:-.01em}
  .ctick{font-size:12px;color:var(--ink3)}
  .note{font-size:26px;font-weight:600;letter-spacing:-.03em;line-height:1;font-variant-numeric:tabular-nums;white-space:nowrap}
  .note s{font-size:12px;color:var(--ink3);font-weight:400;text-decoration:none}
  .pill{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:999px;margin-top:9px}
  .p-buy{background:var(--up-soft);color:var(--up)}
  .p-watch{background:var(--surface);color:var(--ink2)}
  .p-avoid{background:var(--down-soft);color:var(--down)}
  .tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:10px}
  .tag{font-size:11px;background:var(--accent-soft);color:var(--accent);padding:2px 8px;border-radius:999px}
  .tag.w{background:var(--warn-soft);color:var(--warn)}
  .tag.h{background:var(--surface);color:var(--ink2)}
  .held{font-size:10px;font-weight:700;letter-spacing:.05em;color:var(--up);background:var(--up-soft);
    padding:2px 7px;border-radius:999px}

  .panel{border:1px solid var(--line);border-radius:18px;padding:32px 34px;
    box-shadow:0 1px 2px rgba(0,0,0,.03),0 12px 40px rgba(0,0,0,.05)}
  .back{font-size:13px;color:var(--ink2);margin-bottom:16px;display:inline-block}
  h3.blk{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--ink3);
    margin:38px 0 12px;padding-top:20px;border-top:1px solid var(--line2)}
  h3.blk:first-of-type{border-top:0;padding-top:0}
  /* Le heros : une phrase, pas un mur. Il porte la these, il doit se lire d'un coup. */
  .heros{font-size:19px;font-weight:500;letter-spacing:-.015em;line-height:1.5;padding:24px 0 22px;
    border-bottom:1px solid var(--line2);color:var(--ink);max-width:68ch}
  /* Titre de section : ce que l'analyste a voulu dire. */
  .stitre{font-size:19px;font-weight:600;letter-spacing:-.02em;line-height:1.35;margin:0 0 10px;max-width:60ch}
  /* Chapo : le resume de la section, en gris, plus grand que le corps. */
  .chapo{font-size:15.5px;line-height:1.6;color:var(--ink2);margin:0 0 18px;max-width:68ch}
  /* Corps : mesure de lecture stricte. Au-dela de ~70 caracteres, l'oeil decroche. */
  .para{font-size:15px;line-height:1.68;margin:0 0 15px;max-width:68ch;color:var(--ink)}
  .para:last-child{margin-bottom:0}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(118px,1fr));gap:1px;background:var(--line);
    border:1px solid var(--line);border-radius:10px;overflow:hidden;margin:16px 0}
  .kpi{background:var(--bg);padding:13px 14px}
  .kpi .k{font-size:11px;color:var(--ink3);margin-bottom:3px}
  .kpi .v{font-size:15px;font-weight:600;letter-spacing:-.02em;word-break:break-word}
  .kpi .v.na{color:var(--ink3);font-weight:400;font-size:13px}
  ul.clean{list-style:none}
  ul.clean li{padding:7px 0;border-bottom:1px solid var(--line2);font-size:14px}
  ul.clean li:last-child{border:0}
  li.miss{color:var(--down)}
  b.up{color:var(--up)} b.dn{color:var(--down)}
  .prose{font-size:15px;line-height:1.62}
  .prose.rupt{color:var(--down)}
  /* L'avocat du diable est une objection, pas un commentaire. Il doit trancher. */
  .devil{border-left:3px solid var(--down);background:var(--down-soft);border-radius:0 10px 10px 0;
    padding:16px 20px;font-size:15px;line-height:1.62;color:#8a2118;max-width:70ch;margin:0}
  .three{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:24px}
  .verdictbox{display:flex;gap:24px;align-items:center;background:var(--surface);border-radius:var(--r);
    padding:20px 22px;flex-wrap:wrap}

  .fil{display:flex;gap:14px;padding:13px 0;border-bottom:1px solid var(--line2);align-items:flex-start}

  .fil .t{font-size:14px;font-weight:520}
  .fil .m{font-size:12.5px;color:var(--ink2);margin-top:2px;word-break:break-word}
  .fil.cold .t{font-weight:400;color:var(--ink2)}

  .in{border:1px solid var(--line);border-radius:10px;padding:9px 12px;font-size:14px;width:100%;background:var(--bg)}

  .chips{display:flex;gap:5px;flex-wrap:wrap}

  .field{margin-bottom:18px}
  .field label{display:block;font-size:12.5px;color:var(--ink2);margin-bottom:6px}
  .hint{font-size:12.5px;color:var(--ink3);line-height:1.55;margin-top:8px}
  code{background:var(--surface);padding:1px 5px;border-radius:4px;font-size:12.5px}

  .notice{border-radius:var(--r);padding:15px 17px;font-size:14px;line-height:1.55;margin-bottom:16px}
  .notice.info{background:var(--accent-soft);color:#0a4a91}
  .notice.warn{background:var(--warn-soft);color:#7a5200}
  .notice.err{background:var(--down-soft);color:#a3271d}
  .empty{text-align:center;padding:60px 20px;color:var(--ink3)}

  .drop{border:2px dashed var(--line);border-radius:18px;padding:44px 24px;text-align:center;cursor:pointer;

  .drop h3{font-size:17px;font-weight:600;margin-bottom:6px}

  .jm.soon{color:var(--down)}
  .jm.past{color:var(--ink3)}

  .gauge{margin-top:12px}
  .gauge-t{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px}
  .gauge-t span{font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink3)}
  .gauge-t b{font-size:13px;font-weight:600;color:var(--up);font-variant-numeric:tabular-nums}
  .gauge-b{height:4px;background:var(--surface);border-radius:99px;overflow:hidden}
  .gauge-f{height:4px;border-radius:99px;background:linear-gradient(90deg,#a8d5b8,var(--up))}
  .fiche{display:grid;grid-template-columns:236px 1fr;gap:28px;align-items:start}
  .rail-in{position:sticky;top:76px}
  .rnom{font-size:21px;font-weight:600;letter-spacing:-.025em;line-height:1.25;margin-bottom:5px}
  .rnote{display:flex;flex-direction:column;gap:8px;align-items:flex-start;margin:20px 0 0}
  .rnote .pill{margin-top:0}
  .rpot{display:flex;justify-content:space-between;align-items:baseline;margin-top:18px;
    padding-top:16px;border-top:1px solid var(--line2)}
  .rpot span{font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink3)}
  .rpot b{font-size:19px;font-weight:600;color:var(--up);letter-spacing:-.02em}
  .rtrig{margin-top:18px;padding:12px 13px;border-radius:10px;background:var(--surface);

  .rtrig span{display:block;font-size:10px;letter-spacing:.06em;text-transform:uppercase;
    color:var(--ink3);margin-bottom:5px;font-weight:600}
  .rtrig.on span{color:var(--warn)}
  .rnav{margin-top:22px;padding-top:18px;border-top:1px solid var(--line2);display:flex;flex-direction:column;gap:1px}
  .rnav a{display:flex;align-items:center;gap:10px;padding:7px 9px;margin:0 -9px;border-radius:7px;
    font-size:13px;color:var(--ink2);transition:background .12s,color .12s}

    min-width:16px}

    background:linear-gradient(180deg,#fcfcfd,#fff)}
  .scale-top{display:flex;justify-content:space-between;gap:20px;margin-bottom:20px}
  .scale-k{font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink3);margin-bottom:5px}
  .scale-v{font-size:24px;font-weight:600;letter-spacing:-.03em;font-variant-numeric:tabular-nums}
  .scale-v.up{color:var(--up)}
  .scale-v.prot{color:var(--ink2)}
  .bar{position:relative;height:6px;background:var(--surface);border-radius:99px;margin:0 0 22px}
  .bar-up{position:absolute;top:0;height:6px;background:linear-gradient(90deg,rgba(0,102,204,.18),rgba(0,102,204,.42));
    border-radius:99px}
  .tick{position:absolute;top:-4px;width:2px;height:14px;border-radius:2px;transform:translateX(-1px)}
  .now{position:absolute;top:-6px;width:12px;height:18px;border-radius:3px;background:var(--ink);
    transform:translateX(-6px);box-shadow:0 0 0 3px #fff}
  .legs{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px 18px}
  .leg{display:flex;align-items:baseline;gap:8px;font-size:13px}
  .leg i{width:7px;height:7px;border-radius:2px;flex-shrink:0;transform:translateY(-1px)}
  .leg b{font-weight:600;color:var(--ink)}
  .leg span{color:var(--ink2);margin-left:auto;font-variant-numeric:tabular-nums;white-space:nowrap}
  .leg em{font-style:normal;color:var(--ink3);margin-left:5px}
  /* Bandeau : hauteur EGALE, jamais de débordement. Une cellule qui grandit
     casse la grille et fait tout paraître amateur. */
  .synth{display:grid;grid-template-columns:repeat(auto-fit,minmax(96px,1fr));gap:1px;
    background:var(--line);border:1px solid var(--line);border-radius:12px;overflow:hidden;margin:20px 0 10px}
  .sy{background:var(--bg);padding:13px 14px;min-height:66px;display:flex;flex-direction:column;
    justify-content:center}
  .sy.hero{background:#fbfbfd}
  .sy .k{font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink3);margin-bottom:5px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sy .v{font-size:15.5px;font-weight:600;letter-spacing:-.02em;font-variant-numeric:tabular-nums;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sy .v.na{color:var(--ink3);font-weight:400;font-size:13px}
  .dart{border:1px solid var(--line);border-radius:12px;padding:0 16px;margin:0 0 6px}
  .dart summary{cursor:pointer;padding:13px 0;font-size:12.5px;color:var(--ink2);list-style:none;font-weight:500}
  .dart summary::-webkit-details-marker{display:none}
  .dart summary::before{content:"›";display:inline-block;margin-right:8px;color:var(--ink3);transition:transform .15s}
  .dart[open] summary::before{transform:rotate(90deg)}

  .tri{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:1px;

  .ech{display:flex;flex-direction:column;gap:1px;background:var(--line);border:1px solid var(--line);
    border-radius:10px;overflow:hidden;margin-bottom:18px;max-width:70ch}

  .ech-l b{font-weight:600;white-space:nowrap;color:var(--ink)}
  .ech-l span{color:var(--ink2);text-align:right}
  .spin{display:inline-block;width:13px;height:13px;border:2px solid var(--line);border-top-color:#fff;
    border-radius:50%;animation:sp .7s linear infinite;vertical-align:-2px;margin-right:5px}
  @keyframes sp{to{transform:rotate(360deg)}}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
  @media(max-width:640px){#app{padding:0 16px 80px}.topin{padding:0 16px}
    .hero h1{font-size:27px}.tabs{overflow-x:auto}}
</style>
</head>

/* ═══════════════════════════════════════════════════════════════════════════
   VEILLE — deux contraintes dictent ce code.

   1. TIMEOUT 10 s par fonction Netlify. On envoie donc des LOTS.
   2. La table DART (ticker → corp_code) pèse ~20 Mo décompressés. La retélécharger
      à chaque lot faisait exploser le budget : c'est ce qui causait le HTTP 504.
      On la résout UNE FOIS, on la garde en cache, et le scan ne fait plus que les
      appels qui comptent.
   ═══════════════════════════════════════════════════════════════════════════ */
function lancerScan(){
  if(S.scan.actif) return;
  S.scan.actif = true; S.scan.erreur = null; S.scan.progres = "Codes DART…"; render();

  var tickers = S.fiches.map(function(f){ return f.ticker; });
  var end = new Date(), bgn = new Date(Date.now() - S.cfg.fenetre*864e5);
  function F(d){ return d.toISOString().slice(0,10).replace(/-/g,""); }
  var base = S.cfg.relais.replace("/scan","");

  // Étape 1 : les corp_codes. Une seule fois, puis en cache local.
  var cache = get("dv:codes", null);
  var prêt = cache && tickers.every(function(t){ return cache[t] || (cache.__absents||[]).indexOf(t) >= 0; });

  if(prêt){ scanner(cache); return; }

  fetch(base + "/codes", {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ cle: S.cfg.cle, tickers: tickers })
  }).then(function(r){
    if(r.status === 404) throw new Error("Fonction /codes introuvable. Redéploie : elle est nouvelle.");
    if(!r.ok) throw new Error("Codes DART : HTTP " + r.status);
    return r.json();
  }).then(function(d){
    if(d.erreur) throw new Error(d.erreur);
    var c = d.codes || {};
    c.__absents = d.absents || [];
    set("dv:codes", c);
    scanner(c);
  }).catch(function(e){
    S.scan.actif = false; S.scan.progres = null;
    S.scan.erreur = String(e.message || e); render();
  });

  // Étape 2 : les lots. Petits, avec les codes déjà résolus.
  function scanner(codes){
    var LOT = 6, i = 0, attestes = 0, total = 0, echecs = [];

    function lot(){
      if(i >= tickers.length){
        S.scan = { actif:false, progres:null, fait:new Date().toISOString(),
          attestes:attestes, total:total,
          erreur: echecs.length ? (echecs.length + " lot(s) en échec. Relance pour compléter.") : null };
        set("dv:scan", S.scan); save(); S.vue = "veille"; render();
        return;
      }
      var chunk = tickers.slice(i, i + LOT);
      var sous = {};
      chunk.forEach(function(t){ if(codes[t]) sous[t] = codes[t]; });

      fetch(S.cfg.relais, {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ cle:S.cfg.cle, tickers:chunk, codes:sous, bgn:F(bgn), end:F(end) })
      }).then(function(r){
        if(r.status === 404) throw new Error("Relais introuvable (404). Les fonctions ne sont pas déployées.");
        if(r.status === 504) throw new Error("timeout");
        if(!r.ok) throw new Error("HTTP " + r.status);
        return r.json();
      }).then(function(d){
        if(d.erreur) throw new Error(d.erreur);
        attestes += (d.attestes || 0);
        total += (d.total || chunk.length);
        (d.resultats || []).forEach(function(res){
          var f = fiche(res.ticker); if(!f) return;
          var dep = [];
          (res.filings || []).forEach(function(x){
            dep.push({ date:x.rcept_dt, titre:x.report_nm, par:x.flr_nm, no:x.rcept_no,
              type:chaud(x.report_nm), fonds:(fondsDe(x.flr_nm)||fondsDe(x.report_nm)), kind:"depot" });
          });
          (res.majorstock || []).filter(function(x){ return x.in_window; }).forEach(function(x){
            dep.push({ date:x.rcept_dt, titre:"Franchissement 5 % ("+x.report_tp+")", par:x.repror,
              no:x.rcept_no, type:"Franchissement 5%", fonds:fondsDe(x.repror), kind:"5pct",
              pct:x.stkrt, delta:x.stkrt_irds, titres:x.stkqy, objet:null });
          });
          dep.sort(function(a,b){ return String(b.date||"").localeCompare(String(a.date||"")); });
          f.depots = dep;
        });
        suite();
      }).catch(function(e){
        // Un lot en échec ne fait PAS tomber le scan : on note et on continue.
        echecs.push(chunk[0]);
        total += chunk.length;
        suite();
      });

      function suite(){
        i += LOT;
        S.scan.progres = Math.min(i, tickers.length) + "/" + tickers.length;
        render();
        setTimeout(lot, 120);   // respire : evite de saturer OpenDART
      }
    }
    lot();
  }
}

/* ---------- IMPORT ---------- */
function importer(txt, degrade){
  var data;
  try{ data=JSON.parse(txt); }
  catch(e){ S.err="JSON invalide. Dépose le fichier .json produit par le skill à côté du mémo."; S.msg=null; render(); return; }
  var liste=Array.isArray(data)?data:[data];
  var ok=0, inconnus=[];
  liste.forEach(function(m){
    if(!m||!m.ticker) return;
    var f=fiche(String(m.ticker));
    if(!f){ inconnus.push(m.ticker); return; }
    var d = m.date || new Date().toISOString().slice(0,10);
    // On ne consigne QUE les vrais mouvements. Réimporter le même mémo ne doit pas
    // empiler "4.5 → 4.5" cinq fois : un historique qui ne raconte rien est du bruit.
    var change = (f.note !== null && f.note !== undefined && m.note !== f.note);
    if(change){
      f.historique = (f.historique||[]).concat([{date:d, de:f.note, vers:m.note,
        verdict:m.verdict, pourquoi:m.pourquoi_note || ""}]);
    }
    f.memo=m;
    if(m.note!==undefined && m.note!==null) f.note=m.note;
    if(m.verdict) f.verdict=m.verdict;
    if(m.trigger) f.trigger=m.trigger;
    f.arme=!!m.arme;
    if(m.cours!==undefined && m.cours!==null) f.cours=m.cours;
    if(m.detenu!==undefined && m.detenu!==null) f.detenu=!!m.detenu;
    f.importe=d;
    ok++;
  });
  save();
  S.msg = ok ? (ok+" mémo"+(ok>1?"s":"")+" importé"+(ok>1?"s":"")+".") : null;
  S.err = inconnus.length ? ("Tickers absents de la watchlist, ignorés : "+inconnus.join(", ")) : null;
  S.colle="";
  render();
  if(ok && !degrade) setTimeout(function(){ S.vue="titres"; S.msg=null; render(); }, 900);
}

/* Extrait une fiche d'un fichier .html. Voie sûre : la balise JSON embarquée
   que le skill place dans le mémo. Voie de secours : lecture du balisage, en
   PRÉVENANT que c'est deviné (fragile si le gabarit change). */
function extraireHTML(html){
  // Voie sure : la balise <script type=application/json id=fiche> ... fermeture, que le
  var m = html.match(/<script[^>]*id=["']fiche["'][^>]*>([\s\S]*?)<\/script>/i);
  if(m){
    try{ return {data:JSON.parse(m[1].trim()), devine:false}; }
    catch(e){ /* tombe vers la voie de secours */ }
  }
  // Voie de secours : deviner depuis le balisage. Signalée comme telle.
  function pick(re){ var x = html.match(re); return x ? x[1].trim() : null; }
  var ticker = pick(/data-ticker=["']([0-9]{6})["']/i) || pick(/\((\d{6})\)/);
  if(!ticker) return {erreur:"HTML sans balise JSON (id=\"fiche\") et sans ticker repérable. Régénère le mémo avec le skill à jour, qui embarque le JSON."};
  var noteTxt = pick(/data-note=["']([0-9.]+)["']/i) || pick(/([0-5](?:[.,]5)?)\s*\/\s*5/);
  var note = noteTxt ? parseFloat(String(noteTxt).replace(",", ".")) : null;
  var verdict = pick(/data-verdict=["'](ACHETER|SURVEILLER|EVITER)["']/i)
    || pick(/\b(ACHETER|SURVEILLER|EVITER)\b/);
  return {devine:true, data:{ticker:ticker, note:(isNaN(note)?null:note), verdict:verdict,
    date:new Date().toISOString().slice(0,10)}};
}

function lireFichiers(fs){
  Array.prototype.slice.call(fs).forEach(function(file){
    var r=new FileReader();
    var estHtml = /\.html?$/i.test(file.name||"") ;
    r.onload=function(){
      var txt=String(r.result);
      if(estHtml || /^\s*<(!doctype|html)/i.test(txt)){
        var res=extraireHTML(txt);
        if(res.erreur){ S.err=res.erreur; S.msg=null; render(); return; }
        if(res.devine) res.data.partiel=true;          // marque la fiche comme dégradée
        importer(JSON.stringify(res.data), res.devine); // ne bascule PAS si dégradé
        if(res.devine){
          S.err="IMPORT DÉGRADÉ. Ce mémo ne contient pas la balise JSON : seuls le ticker, la note "
            +"et le verdict ont pu être devinés depuis le balisage. Thèse, gouvernance, catalyseurs, "
            +"avocat du diable : PERDUS. Régénère le mémo avec le skill à jour, ou envoie-le à Claude "
            +"pour qu'il y injecte la balise.";
          S.msg=null;
          render();
        }
      } else {
        importer(txt);
      }
    };
    r.readAsText(file);
  });
}


/* ═══════════════════════════════════════════════════════════════════════════
   L'ÉCHELLE DE VALEUR — l'élément signature.

   Le deep value tient en une phrase : quelle est la DISTANCE entre le prix et
   la valeur, et qu'est-ce qui protège en bas. Cette distance se lisait en prose.
   Elle se voit maintenant.

   Axe : du plancher (net-net) à la valeur intrinsèque. Le cours est un repère.
   La zone entre le cours et la cible est le potentiel. Ce qui est SOUS le cours
   est la protection.

   GARDE-FOU : si les valeurs ne sont pas cohérentes avec le cours (unité
   douteuse, extraction ratée), on NE DESSINE PAS. Un graphique faux est pire
   qu'une absence de graphique.
   ═══════════════════════════════════════════════════════════════════════════ */
function nb(s){
  if(s === null || s === undefined) return null;
  if(typeof s === "number") return s;
  var t = String(s).replace(/\u202f|\u00a0/g, " ");
  var m = t.match(/([0-9][0-9 .]{1,})/);
  if(!m) return null;
  var n = parseInt(m[1].replace(/[^0-9]/g, ""), 10);
  return isNaN(n) ? null : n;
}

/* ═══════════════════════════════════════════════════════════════════════════
   LE POTENTIEL — mesure de reference : 80 % DE LA VANT.

   C'est l'objectif d'accumulation de la methode Daubasses : on vise 80 % de la
   valeur d'actif net tangible, pas la VANT pleine (marge de securite), et pas la
   cible du redacteur (qui varie d'un memo a l'autre).

   REPLI : si la VANT par action n'est pas disponible (27 memos sur 54 ne
   l'expriment qu'en total), on retombe sur la cible du memo, ET ON LE DIT.
   On n'invente jamais une VANT par action a partir d'un total.
   Renvoie {v: pourcentage, src: "VANT"|"cible"} ou null.
   ═══════════════════════════════════════════════════════════════════════════ */
function potentiel(f){
  var M = f.memo || {};
  var cours = f.cours || M.cours;
  if(!cours) return null;

  // 1. Voie principale : 80 % de la VANT par action.
  var vpa = f.vant_action || M.vant_action;
  if(vpa && vpa > cours * 0.2 && vpa < cours * 15){
    return { v: Math.round((vpa * 0.8 / cours - 1) * 100), src: "VANT", cible: Math.round(vpa * 0.8) };
  }

  // 2. Repli : la cible du memo. Signalee comme telle.
  var P = M.potentiel || {};
  if(!P.echelle) return null;
  var e = {};
  P.echelle.forEach(function(x){ var i = x.indexOf(" : "); if(i>0) e[x.slice(0,i)] = x.slice(i+3); });
  var c = nb(e["Cible 2-4 ans"]);
  if(!c || c < cours*0.15 || c > cours*12) return null;
  return { v: Math.round((c/cours - 1) * 100), src: "cible", cible: c };
}
function potV(f){ var p = potentiel(f); return p ? p.v : null; }

function echelleValeur(f){
  var M = f.memo || {};
  var P = M.potentiel || {};
  var cours = f.cours || M.cours;
  if(!cours || !P.echelle || !P.echelle.length) return "";

  var e = {};
  P.echelle.forEach(function(x){
    var i = x.indexOf(" : ");
    if(i > 0) e[x.slice(0, i)] = x.slice(i + 3);
  });

  var pts = [
    { k: "Plancher",   v: nb(e["Plancher (net-net)"]), c: "var(--up)",     r: "net-net" },
    { k: "Cible",      v: nb(e["Cible 2-4 ans"]),      c: "var(--accent)", r: "2 à 4 ans" },
    { k: "Intrinsèque",v: nb(e["Valeur intrinsèque"]), c: "var(--ink)",    r: "VANT" }
  ].filter(function(p){
    // Cohérence : une valeur par action est du meme ordre que le cours.
    return p.v && p.v > cours * 0.15 && p.v < cours * 12;
  });
  if(pts.length < 2) return "";   // rien de fiable a montrer : on s'abstient

  var vals = pts.map(function(p){ return p.v; }).concat([cours]);
  var lo = Math.min.apply(null, vals) * 0.92;
  var hi = Math.max.apply(null, vals) * 1.06;
  var pos = function(v){ return ((v - lo) / (hi - lo)) * 100; };

  var plancher = pts.filter(function(p){ return p.k === "Plancher"; })[0];
  var po = potentiel(f);
  var up = po ? po.v : null;
  var prot = plancher ? Math.round((plancher.v / cours - 1) * 100) : null;

  // Si le potentiel vient de la VANT, on place ce repere sur l'axe.
  if(po && po.src === "VANT" && po.cible){
    pts.push({ k: "80 % VANT", v: po.cible, c: "var(--accent)", r: "objectif" });
    var vv = pts.map(function(p){ return p.v; }).concat([cours]);
    lo = Math.min.apply(null, vv) * 0.92;
    hi = Math.max.apply(null, vv) * 1.06;
    pos = function(v){ return ((v - lo) / (hi - lo)) * 100; };
  }
  var cible = pts.filter(function(p){ return p.k === "80 % VANT" || p.k === "Cible"; })[0];

  var h = '<div class="scale">';
  // Deux chiffres, jamais une phrase. Un libelle explique, une valeur se lit.
  h += '<div class="scale-top">'
     + '<div><div class="scale-k">Potentiel · ' + (po && po.src === "VANT" ? "80 % VANT" : "cible") + '</div>'
     + '<div class="scale-v' + (up !== null && up > 0 ? ' up' : '') + '">'
     + (up === null ? "—" : (up > 0 ? "+" : "") + up + " %") + '</div></div>'
     + '<div style="text-align:right"><div class="scale-k">'
     + (prot !== null && prot > 0 ? "Plancher au-dessus du cours" : "Protection sous le cours") + '</div>'
     + '<div class="scale-v prot">'
     + (prot === null ? "—" : (prot > 0 ? "+" + prot + " %" : prot + " %")) + '</div></div>'
     + '</div>';

  // barre : zone de potentiel (cours -> cible) surlignee
  h += '<div class="bar">';
  if(cible && cible.v > cours){
    h += '<div class="bar-up" style="left:' + pos(cours) + '%;width:'
       + Math.max(0, pos(cible.v) - pos(cours)) + '%"></div>';
  }
  pts.forEach(function(p){
    h += '<div class="tick" style="left:' + pos(p.v) + '%;background:' + p.c + '"></div>';
  });
  h += '<div class="now" style="left:' + pos(cours) + '%"></div>';
  h += '</div>';

  // legende : chaque repere, sa valeur, son ecart au cours
  h += '<div class="legs">';
  h += '<div class="leg"><i style="background:var(--ink2)"></i><b>Cours</b>'
     + '<span>' + cours.toLocaleString("fr-FR") + ' ₩</span></div>';
  pts.forEach(function(p){
    var d = Math.round((p.v / cours - 1) * 100);
    h += '<div class="leg"><i style="background:' + p.c + '"></i><b>' + esc(p.k) + '</b>'
       + '<span>' + p.v.toLocaleString("fr-FR") + ' ₩ <em>'
       + (d > 0 ? "+" : "") + d + ' %</em></span></div>';
  });
  h += '</div></div>';
  return h;
}

  else if(chauds>0){ titre = chauds+" dépôt"+(chauds>1?"s":"")+" à qualifier.";
    sous = "Des dépôts sont tombés. Aucun n'arme de trigger."; }
  else { titre = "Rien d'armé.";
    sous = "Aucun trigger armé sur les 53 titres. Une semaine calme est une information."; }

  var h = '<div class="hero"><h1>'+esc(titre)+'</h1><p>'+esc(sous)+'</p>'
    + '<div class="attest"><span class="dot'+(S.scan.fait?"":" off")+'"></span>'
    + (S.scan.fait
        ? esc(S.scan.attestes+"/"+S.scan.total+" titres attestés sur le flux DART · "+fr(S.scan.fait))
        : "Veille jamais lancée. Aucune couverture attestée.")
    + esc(" · "+memos+" mémos") + '</div></div>';

  if(revoir.length>0){
    h += '<div class="sec" style="padding-bottom:0"><div class="notice info"><b>À reprendre avec le skill.</b> '
      + esc(revoir.map(function(f){return f.nom;}).join(", "))
      + '. Un dépôt DART est postérieur au dernier mémo : la note ne l\'intègre pas encore.</div></div>';
  }

  var tris=[["note","Meilleures notes"],["pot","Potentiel"],["revoir","À réanalyser"],
    ["arme","Triggers armés"],["detenu","Détenus"],["nom","A→Z"]];
  h += '<div class="sec"><div class="sechead">'
    + '<input class="in" id="filtre" style="max-width:250px" placeholder="Filtrer" value="'+esc(S.filtre)+'">'
    + '<div class="chips">' + tris.map(function(t){
        return '<button class="chip'+(S.tri===t[0]?" on":"")+'" data-tri="'+t[0]+'">'+esc(t[1])+'</button>';
      }).join("") + '</div></div>';

  var l = S.fiches.slice();
  if(S.filtre.trim()){
    var q=S.filtre.toLowerCase();
    l=l.filter(function(f){ return f.nom.toLowerCase().indexOf(q)>=0 || f.ticker.indexOf(q)>=0; });
  }
  function n(x){ return (x===null||x===undefined) ? -1 : x; }
  if(S.tri==="note")   l.sort(function(a,b){ return (n(b.note)-n(a.note)) || a.nom.localeCompare(b.nom); });
  if(S.tri==="pot")    l.sort(function(a,b){
    var pa = potV(a), pb = potV(b);
    return (pb===null?-9999:pb) - (pa===null?-9999:pa) || (n(b.note)-n(a.note));
  });
  if(S.tri==="revoir") l.sort(function(a,b){ return ((aRevoir(b)?1:0)-(aRevoir(a)?1:0)) || (n(b.note)-n(a.note)); });
  if(S.tri==="arme")   l.sort(function(a,b){ return ((b.arme?1:0)-(a.arme?1:0)) || (n(b.note)-n(a.note)); });
  if(S.tri==="detenu") l.sort(function(a,b){ return ((b.detenu?1:0)-(a.detenu?1:0)) || (n(b.note)-n(a.note)); });
  if(S.tri==="nom")    l.sort(function(a,b){ return a.nom.localeCompare(b.nom); });

  // Le potentiel max sert d'echelle commune : les jauges se comparent a vue.
  var maxPot = 0;
  l.forEach(function(f){ var p = potV(f); if(p !== null && p > maxPot) maxPot = p; });

  h += '<div class="grid">' + l.map(function(f){
    var sig = signaux(f);
    var cls = f.arme ? " armed" : (aRevoir(f) ? " stale" : "");
    var pot = potentiel(f);
    var t = '<div class="card'+cls+'" data-open="'+f.ticker+'">'
      + '<div class="chead"><div style="min-width:0">'
      + '<div class="cname">'+esc(f.nom)+'</div>'
      + '<div class="ctick">'+esc(f.ticker)+(f.detenu?' · <span class="held">DÉTENU</span>':'')+'</div>'
      + '</div>' + vNote(f.note) + '</div>';
    t += (f.memo && f.memo.partiel) ? '<span class="pill p-avoid">Mémo partiel</span>'
      : (f.verdict ? vPill(f.verdict) : '<span class="pill p-watch">Pas de mémo</span>');

    // JAUGE : la decote se voit, elle ne se lit plus.
    if(pot !== null){
      var w = maxPot > 0 ? Math.max(3, Math.min(100, (pot / maxPot) * 100)) : 0;
      t += '<div class="gauge"><div class="gauge-t"><span>Potentiel</span>'
         + '<b>' + (pot > 0 ? "+" : "") + pot + ' %</b></div>'
         + '<div class="gauge-b"><div class="gauge-f" style="width:' + w + '%"></div></div></div>';
    }

    if(sig.length){
      t += '<div class="tags">' + sig.slice(0,2).map(function(s){
        return '<span class="tag'+(s.fonds?" w":"")+'">'+esc(s.type)+'</span>';
      }).join("") + (sig.length>2 ? '<span class="tag h">+'+(sig.length-2)+'</span>' : '') + '</div>';
    }
    return t + '</div>';
  }).join("") + '</div></div>';
  return h;
}

function vFiche(){
  var f=fiche(S.sel); if(!f){ S.vue="titres"; return vTitres(); }
  var M=f.memo;
  var po = potentiel(f);
  var pot = po ? po.v : null;
  var h = '<div class="sec"><button class="back" id="back">← Tous les titres</button>';
  h += '<div class="fiche">';

  /* ── RAIL : l'identité et le verdict restent visibles pendant qu'on lit. ── */
  h += '<aside class="rail"><div class="rail-in">'
    + '<h1 class="rnom">'+esc(f.nom)+'</h1>'
    + '<div class="ctick">'+esc(f.ticker)+' · KRX'+(f.detenu?' · <span class="held">DÉTENU</span>':'')+'</div>'
    + '<div class="rnote">'+vNote(f.note,44)+(f.verdict?vPill(f.verdict):'')+'</div>';
  if(pot !== null) h += '<div class="rpot"><span>'
    + (po.src === "VANT" ? "Potentiel · 80 % VANT" : "Potentiel · cible du mémo")
    + '</span><b>'+(pot>0?"+":"")+pot+' %</b></div>';
  if(f.trigger) h += '<div class="rtrig'+(f.arme?' on':'')+'">'
    + '<span>'+(f.arme?'Trigger ARMÉ':'Trigger')+'</span>'+esc(f.trigger)+'</div>';
  // NAVIGATION : une page longue sans sommaire est un labyrinthe.
  if(f.memo){
    var nav = [["s01","01","Actif"],["s02","02","Résultat"],["s03","03","Valeur relative"],
               ["s04","04","Gouvernance"],["s05","05","Potentiel"],["s06","06","Verdict"]];
    h += '<nav class="rnav">' + nav.map(function(x){
      return '<a href="#'+x[0]+'"><i>'+x[1]+'</i>'+esc(x[2])+'</a>';
    }).join("") + '</nav>';
  }
  if(f.importe) h += '<div class="ctick" style="margin-top:16px">mémo du '+esc(f.importe)+'</div>';
  h += '</div></aside>';

  h += '<div class="panel">';

  if(M && M.partiel) h += '<div class="notice err" style="margin-top:20px"><b>Mémo partiel.</b> '
    + 'Ce mémo a été importé en mode dégradé : seuls la note et le verdict ont été récupérés. '
    + 'Le raisonnement (thèse, gouvernance, catalyseurs, avocat du diable) n\'a PAS été importé. '
    + 'Cette note n\'est pas auditable en l\'état. Régénère le mémo avec le skill à jour.</div>';
  if(f.arme) h += '<div class="notice warn" style="margin-top:20px"><b>Trigger armé.</b> '+esc(f.trigger)+'</div>';
  if(aRevoir(f)) h += '<div class="notice info" style="margin-top:14px"><b>Mémo dépassé.</b> '
    + 'Un dépôt DART est postérieur. Reprends ce titre avec le skill Graham x Daubasses, '
    + 'puis réimporte le JSON : note, trigger et historique se mettent à jour.</div>';

  /* BANDEAU DE SYNTHÈSE : les chiffres de décision, en haut, toujours visibles.
     Sans cours ni plancher, on ne décide pas. Ils passent donc avant la prose. */
  var M0 = f.memo || {};
  var A0 = M0.actif || {};
  var cours = f.cours || M0.cours || null;
  function sy(k, v, hero){
    var vide = !eok(v);
    return '<div class="sy'+(hero?' hero':'')+'"><div class="k">'+esc(k)+'</div>'
      + '<div class="v'+(vide?' na':'')+'">'+(vide?'—':esc(v))+'</div></div>';
  }
  h += echelleValeur(f);
  h += '<div class="synth">'
    + sy("Cours", cours ? cours.toLocaleString("fr-FR")+" ₩" : null, true)
    + sy("Capitalisation", M0.capi)
    + sy("Net-net (VANN)", A0.vann)
    + sy("VANT", A0.vant)
    + sy("Trésorerie nette", A0.net_cash)
    + sy("EV", A0.ev)
    + '</div>';

  /* Bilan DART : source primaire, REPLIÉE. Elle sert à emporter la donnée dans la
     session d'analyse, pas à encombrer la lecture du mémo. */
  var b = f.bilan, C = (b && b.comptes) || {}, K = (b && b.calcul) || {};
  h += '<details class="dart"><summary>Bilan DART (source primaire) · tirer, saisir le cours, copier</summary>';
  if(b && b.comptes){
    h += '<div class="kpis" style="margin-top:4px">'
      + vKpi("Capitaux propres", money(C.capitaux_propres), "—")
      + vKpi("Trésorerie", money(C.tresorerie), "—")
      + vKpi("Dettes", money(C.passif_total), "—")
      + vKpi("Trésorerie nette", money(K.net_cash), "—")
      + vKpi("VANN", money(K.vann), "—")
      + '</div>'
      + '<p class="hint">Bilan '+esc(b.exercice)+' '+esc(b.periode)
      + '. Mapping des comptes heuristique : vérifie les postes avant d\'en tirer une VANN.</p>';
  }
  if(b && b.erreur) h += '<div class="notice err" style="margin-top:12px">'+esc(b.erreur)+'</div>';
  h += '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:12px">'
    + '<button class="cta ghost" data-bilan="'+esc(f.ticker)+'">'
    + ((b && b.chargement) ? '<span class="spin" style="border-top-color:var(--accent)"></span>Bilan' : 'Tirer le bilan DART')
    + '</button>'
    + '<input class="in" id="cours" type="number" style="max-width:180px" placeholder="Cours du jour (KRW)" value="'+(f.cours||"")+'">'
    + '<button class="cta ghost" data-copie="'+esc(f.ticker)+'">Copier pour l\'analyse</button>'
    + '</div></details>';

  /* dépôts */
  if((f.depots||[]).length){
    h += '<h3 class="blk">Dépôts dans la fenêtre — tous, sans filtre de type</h3>';
    h += f.depots.map(function(d,i){ return vDepot(d,f.ticker,i); }).join("");
  }

  /* mémo */
  if(!M){
    h += '<div class="empty"><p>Aucun mémo. L\'analyse se fait avec le skill Graham x Daubasses,<br>'
      + 'puis s\'importe ici en JSON.</p>'
      + '<button class="cta ghost" data-vue="import">Importer un mémo</button></div>';
  } else {
    if(M.partiel){
      h += '<div class="empty"><p>Le contenu du mémo n\'a pas été importé.<br>'
        + 'Seuls la note (' + esc(M.note) + '/5) et le verdict sont connus.</p>'
        + '<button class="cta ghost" data-vue="import">Réimporter un mémo complet</button></div>';
      return h + '</div></div>';
    }
    var A=M.actif||{}, R=M.resultat||{}, V=M.relatif||{}, G=M.gouvernance||{}, P=M.potentiel||{};
    h += '<div class="heros">'+esc(M.heros)+'</div>';
    // Une section = numero, titre, chapo, encadres chiffres, puis la prose.
    // Les chiffres vivent dans les encadres. La prose ne les repete pas.
    function vSection(num, def, S, kpis){
      var h = '<h3 class="blk" id="s' + num + '">' + num + ' · ' + def + '</h3>';
      if(S.titre) h += '<div class="stitre">' + esc(S.titre) + '</div>';
      if(S.chapo) h += '<p class="chapo">' + esc(S.chapo) + '</p>';
      if(kpis) h += kpis;
      var ps = S.paras && S.paras.length ? S.paras
             : (S.commentaire ? [S.commentaire] : []);
      ps.forEach(function(p){ h += '<p class="para">' + esc(p) + '</p>'; });
      return h;
    }

    h += vSection("01", "Actif", A,
      '<div class="kpis">' + vKpi("Trésorerie nette",A.net_cash) + vKpi("VANN",A.vann)
      + vKpi("VANT",A.vant) + vKpi("EV",A.ev) + vKpi("VMLV",A.vmlv) + '</div>');
    h += vSection("02", "Résultat", R, null);
    h += vSection("03", "Valeur relative", V, null);
    if(V.pairs && V.pairs.length) h += '<div class="tags" style="margin-top:10px">'
      + V.pairs.map(function(p){ return '<span class="tag h">'+esc(p)+'</span>'; }).join("") + '</div>';
    h += vSection("04", "Gouvernance", G, null);
    if(G.controle_famille_hors_autocontrole)
      h += '<div class="notice info" style="margin-top:10px;font-size:13px"><b>Contrôle réel, hors autocontrôle</b> : '
        + esc(G.controle_famille_hors_autocontrole)+'</div>';
    h += '<h3 class="blk" id="s05">05 · Potentiel et asymétrie</h3>';
    if(P.echelle && P.echelle.length){
      h += '<div class="ech">' + P.echelle.map(function(e){
        var i = e.indexOf(" : ");
        if(i < 0) return '<div class="ech-l"><span>'+esc(e)+'</span></div>';
        return '<div class="ech-l"><b>'+esc(e.slice(0,i))+'</b><span>'+esc(e.slice(i+3))+'</span></div>';
      }).join("") + '</div>';
    }
    // Une colonne vide n'a rien a dire. On ne l'affiche pas.
    var tri = [];
    if(P.tri_adverse)      tri.push(["Adverse", P.tri_adverse]);
    if(P.tri_adverse_plus) tri.push(["Adverse +", P.tri_adverse_plus]);
    if(P.tri_base)         tri.push(["Base", P.tri_base]);
    if(tri.length){
      h += '<div class="tri">' + tri.map(function(x){
        return '<div class="tri-c"><div class="tri-k">'+esc(x[0])+'</div>'
             + '<p class="tri-p">'+esc(x[1])+'</p></div>';
      }).join("") + '</div>';
    }
    if(P.angle_mort_du_temps) h += '<div class="notice warn" style="margin-top:14px;font-size:13px">'
      + '<b>Angle mort du temps.</b> '+esc(P.angle_mort_du_temps)+'</div>';
    h += '<h3 class="blk">Avocat du diable</h3>'
      + '<blockquote class="devil">' + esc(M.avocat_du_diable) + '</blockquote>';
    function liste(arr,cls){
      return '<ul class="clean">'+arr.map(function(t){
        return '<li'+(cls?' class="'+cls+'"':'')+'>'+esc(t)+'</li>'; }).join("")+'</ul>';
    }
    // Un bloc vide ne s'affiche PAS. Un tiret dans une colonne vide est du bruit,
    // et laisse croire que l'information a été cherchée puis non trouvée.
    var col = [];
    if(M.sait && M.sait.length)   col.push('<div><h3 class="blk" style="margin-top:0;border-top:0;padding-top:0">Su</h3>'+liste(M.sait)+'</div>');
    if(M.deduit && M.deduit.length) col.push('<div><h3 class="blk" style="margin-top:0;border-top:0;padding-top:0">Déduit</h3>'+liste(M.deduit)+'</div>');
    if(M.manque && M.manque.length) col.push('<div><h3 class="blk" style="margin-top:0;border-top:0;padding-top:0">Manque</h3>'+liste(M.manque,"miss")+'</div>');
    if(col.length) h += '<h3 class="blk">Su, déduit, manquant</h3><div class="three">'+col.join("")+'</div>';
    if(M.catalyseurs && M.catalyseurs.length)
      h += '<h3 class="blk">Catalyseurs datés</h3>'+liste(M.catalyseurs);
    h += '<h3 class="blk" id="s06">06 · Verdict</h3><div class="verdictbox">'
      + '<div style="text-align:center;flex-shrink:0">'+vNote(M.note,34)+vPill(M.verdict)+'</div>'
      + '<p class="prose" style="flex:1;font-size:14px">'+esc(M.pourquoi_note)+'</p></div>';
    if(M.note_pratique) h += '<p class="hint"><b>Note pratique</b>, qui ne plafonne jamais la note : '
      + esc(M.note_pratique)+'</p>';
    if(M.memo_url) h += '<p class="hint"><a href="'+esc(M.memo_url)+'" target="_blank" rel="noreferrer">Ouvrir le mémo HTML complet ↗</a></p>';
    h += '<p class="hint">Ni conseil ni recommandation personnalisée.</p>';

    // Purge : les imports répétés ont pu empiler des lignes sans mouvement.
    var hist = (f.historique||[]).filter(function(x){
      return x.de !== null && x.de !== undefined && x.de !== x.vers;
    });
    if(hist.length){
      h += '<h3 class="blk">Mouvements de la note</h3><ul class="clean">'
        + hist.slice().reverse().map(function(x){
            var sens = x.vers > x.de ? "up" : "dn";
            return '<li>'+esc(x.date)+' · <b class="'+sens+'">'+esc(x.de)+' → '+esc(x.vers)+'</b>'
              + (x.pourquoi ? ' · '+esc(x.pourquoi) : '') + '</li>';
          }).join("") + '</ul>';
    }
  }
  return h + '</div></div></div>';
}

          + '<div style="flex:1"><div class="cname">'+esc(x.t)+'</div>'
          + '<div style="font-size:13px;color:var(--ink2);margin-top:2px">'+esc(x.q)+'</div>'
          + '<div class="tags"><span class="tag h">'+esc(x.c)+'</span></div></div>'
          + '<div class="ctick">'+fr(x.d)+'</div></div>';
      }).join("") + '</div>';
}

function vReglages(){
  return '<div class="sec"><div class="panel">'
    + '<h2 style="font-size:21px;font-weight:600;margin-bottom:22px">Réglages</h2>'
    + '<div class="field"><label>Clé OpenDART</label>'
    + '<input class="in" id="cle" type="password" placeholder="40 caractères" value="'+esc(S.cfg.cle)+'">'
    + '<p class="hint">Laisse vide si tu as mis <code>OPENDART_KEY</code> en variable d\'environnement '
    + 'Netlify : plus sûr, la clé ne quitte jamais le serveur.</p></div>'
    + '<div class="field"><label>Relais</label>'
    + '<input class="in" id="relais" value="'+esc(S.cfg.relais)+'">'
    + '<p class="hint">OpenDART ne renvoie pas les en-têtes CORS : aucun navigateur ne peut l\'appeler '
    + 'directement. Le relais fait l\'appel côté serveur. Par défaut <code>/.netlify/functions/scan</code>.</p></div>'
    + '<div class="field"><label>Fenêtre du scan manuel</label><div class="chips">'
    + [[1,"1 jour"],[7,"7 jours"],[30,"30 jours"]].map(function(p){
        return '<button class="chip'+(S.cfg.fenetre===p[0]?" on":"")+'" data-fen="'+p[0]+'">'+p[1]+'</button>';
      }).join("")
    + '</div><p class="hint">La veille automatique (app fermée, chaque lundi) tourne côté Netlify et ne '
    + 'dépend pas de ce réglage.</p></div>'
    + '<div class="field"><label>Données</label>'
    + '<button class="cta ghost" id="btn-reset">Réinitialiser</button></div>'
    + '</div></div>';
}

function render(){
  var c = "";
  if(S.vue==="titres") c = S.sel ? vFiche() : vTitres();
  else if(S.vue==="veille") c = vVeille();
  else if(S.vue==="import") c = vImport();
  else if(S.vue==="calendrier") c = vCalendrier();
  else if(S.vue==="reglages") c = vReglages();
  document.getElementById("app").innerHTML = vHeader() + c;
  brancher();
}

/* ═══════════════════════ ÉVÉNEMENTS ═══════════════════════ */
function brancher(){
  var app=document.getElementById("app");

  app.querySelectorAll("[data-vue]").forEach(function(b){
    b.onclick=function(){ S.vue=b.getAttribute("data-vue"); S.sel=null; S.msg=null; S.err=null; render(); };
  });
  app.querySelectorAll("[data-open]").forEach(function(b){
    b.onclick=function(){ S.sel=b.getAttribute("data-open"); S.vue="titres"; render();
      window.scrollTo(0,0); };
  });
  app.querySelectorAll("[data-tri]").forEach(function(b){
    b.onclick=function(){ S.tri=b.getAttribute("data-tri"); render(); };
  });
  app.querySelectorAll("[data-fen]").forEach(function(b){
    b.onclick=function(){ S.cfg.fenetre=parseInt(b.getAttribute("data-fen"),10); save(); render(); };
  });
  app.querySelectorAll("[data-bilan]").forEach(function(b){
    b.onclick=function(){ tirerBilan(b.getAttribute("data-bilan")); };
  });
  app.querySelectorAll("[data-copie]").forEach(function(b){
    b.onclick=function(){
      var f=fiche(b.getAttribute("data-copie"));
      var t=JSON.stringify({ticker:f.ticker,nom:f.nom,cours:f.cours,bilan:f.bilan,depots:f.depots},null,2);
      if(navigator.clipboard) navigator.clipboard.writeText(t);
      b.textContent="Copié";
      setTimeout(function(){ b.textContent="Copier pour l'analyse"; },1400);
    };
  });
  app.querySelectorAll("[data-objet]").forEach(function(b){
    b.onclick=function(){
      var f=fiche(b.getAttribute("data-t"));
      var i=parseInt(b.getAttribute("data-i"),10);
      var o=b.getAttribute("data-objet");
      f.depots[i].objet=o;
      if(o!=="단순투자") f.arme=true;
      save(); render();
    };
  });

  var s1=document.getElementById("btn-scan"); if(s1) s1.onclick=lancerScan;
  var s2=document.getElementById("btn-scan2"); if(s2) s2.onclick=lancerScan;
  var bk=document.getElementById("back"); if(bk) bk.onclick=function(){ S.sel=null; render(); };

  var fl=document.getElementById("filtre");
  if(fl){ fl.oninput=function(){ S.filtre=fl.value; var p=fl.selectionStart; render();
    var n=document.getElementById("filtre"); if(n){ n.focus(); n.setSelectionRange(p,p); } }; }

  var co=document.getElementById("cours");
  if(co){ co.onblur=function(){ var f=fiche(S.sel); f.cours=co.value?+co.value:null; save(); render(); }; }

  var cl=document.getElementById("cle");
  if(cl){ cl.onblur=function(){ S.cfg.cle=cl.value.trim(); save(); }; }
  var rl=document.getElementById("relais");
  if(rl){ rl.onblur=function(){ S.cfg.relais=rl.value.trim(); save(); }; }

  var dp=document.getElementById("drop"), fi=document.getElementById("file");
  if(dp){
    dp.onclick=function(){ fi.click(); };
    dp.ondragover=function(e){ e.preventDefault(); dp.classList.add("over"); };
    dp.ondragleave=function(){ dp.classList.remove("over"); };
    dp.ondrop=function(e){ e.preventDefault(); dp.classList.remove("over"); lireFichiers(e.dataTransfer.files); };
    fi.onchange=function(){ lireFichiers(fi.files); };
  }
  var ta=document.getElementById("colle");
  if(ta){ ta.oninput=function(){ S.colle=ta.value; }; }
  var bc=document.getElementById("btn-colle");
  if(bc){ bc.onclick=function(){ if(S.colle.trim()) importer(S.colle); }; }

  var be=document.getElementById("btn-export");
  if(be){ be.onclick=function(){
    var blob=new Blob([JSON.stringify(S.fiches,null,2)],{type:"application/json"});
    var a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="decotes-sauvegarde-"+new Date().toISOString().slice(0,10)+".json";
    a.click();
  }; }

  var br=document.getElementById("btn-reset");
  if(br){ br.onclick=function(){
    if(!confirm("Effacer fiches, mémos et historique ?")) return;
    S.fiches=seed(); save(); render();
  }; }
}

render();
})();
</script>
</body>
</html>
